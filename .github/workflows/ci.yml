name: AidFlow CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  POSTGRES_DB: aidflow
  POSTGRES_USER: aidflow
  POSTGRES_PASSWORD: aidflow_test
  DATABASE_URL: postgresql://aidflow:aidflow_test@localhost:5432/aidflow
  GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
  DEBUG: 'false'
  SECRET_KEY: ci-secret-key-not-for-production-use

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: aidflow
          POSTGRES_USER: aidflow
          POSTGRES_PASSWORD: aidflow_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U aidflow -d aidflow"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: --health-cmd "redis-cli ping" --health-interval 10s --health-timeout 5s --health-retries 5

      qdrant:
        image: qdrant/qdrant:latest
        ports:
          - 6333:6333

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          # No pip cache — stale GHA cache was serving pycairo sdist
          # from old runs that used the full requirements.txt

      - name: Install system dependencies for native builds
        run: sudo apt-get install -y --no-install-recommends libcairo2-dev pkg-config

      - name: Install CI dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --no-cache-dir -r requirements-ci.txt

      - name: Wait for Postgres to be ready
        run: |
          for i in {1..10}; do
            pg_isready -h localhost -p 5432 -U aidflow -d aidflow && break
            echo "Waiting for postgres... ($i)"
            sleep 3
          done

      - name: Run Django migrations
        run: python manage.py migrate --noinput

      - name: Run Django system checks
        run: python manage.py check

      - name: Run linting (flake8)
        run: |
          flake8 . \
            --exclude=venv,env,.env,staticfiles,migrations,ml_service/models \
            --max-line-length=120 \
            --ignore=E501,W503,E203 \
            --per-file-ignores="tests/*:F401,F811"

      - name: Run pytest
        run: |
          pytest tests/ -v --cov=. --cov-report=xml --cov-report=term-missing \
            --ignore=tests/test_api.py

  docker-build:
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: aidflow:latest
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Test Docker image starts
        run: |
          docker run --rm -d --name aidflow-test \
            -e DATABASE_URL=sqlite:///test.db \
            -e DEBUG=1 \
            -e SECRET_KEY=ci-test-key-not-for-prod \
            -p 8000:8000 \
            aidflow:latest
          sleep 15
          curl -f http://localhost:8000/ || exit 1
          docker stop aidflow-test

  deploy-staging:
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: staging
    steps:
      - name: Deploy to staging (placeholder)
        run: echo "Deploy to staging would happen here"